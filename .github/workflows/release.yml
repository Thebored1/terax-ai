name: Release

on:
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust-target: ""
          - platform: windows-latest
            args: ""
            rust-target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.platform }}-${{ matrix.rust-target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Write Apple API key to disk
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        env:
          KEY_CONTENT: ${{ secrets.APPLE_API_KEY_PATH }}
        run: |
          mkdir -p "$HOME/private_keys"
          printf '%s' "$KEY_CONTENT" > "$HOME/private_keys/AuthKey.p8"
          echo "APPLE_API_KEY_PATH=$HOME/private_keys/AuthKey.p8" >> "$GITHUB_ENV"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Terax ${{ github.ref_name }}"
          releaseBody: "See the assets to download and install. Auto-update is built in."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Build Inno Setup installer (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          choco install innosetup -y

          $msi = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1
          if (-not $msi) {
            throw "No MSI artifact found in src-tauri/target/release/bundle/msi"
          }

          $version = (Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json).version
          if (-not $version) {
            throw "Could not read version from src-tauri/tauri.conf.json"
          }

          $issuer = "${{ github.repository_owner }}"
          $iss = @"
          #define MyAppName "Terax"
          #define MyAppVersion "${version}"
          #define MyAppPublisher "${issuer}"
          #define MyAppExeName "Terax.exe"
          #define MyAppURL "https://github.com/${{ github.repository }}"
          #define MsiPath "${($msi.FullName -replace '\\','\\')}"

          [Setup]
          AppId={{A44A93D4-0E66-49DF-9F24-BD77B8D4D2FA}
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          AppPublisher={#MyAppPublisher}
          AppPublisherURL={#MyAppURL}
          AppSupportURL={#MyAppURL}
          AppUpdatesURL={#MyAppURL}/releases
          DefaultDirName={autopf}\{#MyAppName}
          DefaultGroupName={#MyAppName}
          DisableProgramGroupPage=yes
          OutputDir=src-tauri\target\release\bundle\inno
          OutputBaseFilename=Terax_{#MyAppVersion}_x64-setup
          Compression=lzma
          SolidCompression=yes
          WizardStyle=modern
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible
          PrivilegesRequired=lowest

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Files]
          Source: "{#MsiPath}"; DestDir: "{tmp}"; DestName: "terax.msi"; Flags: deleteafterinstall

          [Run]
          Filename: "msiexec.exe"; Parameters: "/i ""{tmp}\terax.msi"""; StatusMsg: "Installing Terax..."; Flags: waituntilterminated
          "@

          $issPath = "src-tauri/target/release/inno-terax.iss"
          Set-Content -Path $issPath -Value $iss -Encoding UTF8

          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" $issPath

      - name: Upload Inno installer to GitHub Release
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $asset = Get-ChildItem "src-tauri/target/release/bundle/inno/*.exe" | Select-Object -First 1
          if (-not $asset) {
            throw "No Inno installer found in src-tauri/target/release/bundle/inno"
          }
          gh release upload "${{ github.ref_name }}" "$($asset.FullName)" --clobber
